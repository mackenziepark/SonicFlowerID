<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity</title>

    <link rel="stylesheet" href="identity.css">
</head>
<body>

    <div class="identity-page">

        <!-- 배경 이미지 -->
        <img src="assets/identity.png" class="page-bg" alt="Identity Page">

        <!-- 이름 입력 -->
        <input
            id="nameInput"
            class="text-input name-input"
            type="text"
            placeholder="+add name"
        >

        <!-- 생일 입력 -->
        <input
            id="birthdayInput"
            class="text-input birthday-input"
            type="text"
            placeholder="+add b-day"
        >

        <!-- 오른쪽 아래 화살표 클릭 영역 -->
        <button
            id="nextBtn"
            class="next-area"
            aria-label="Next Page">
        </button>

    </div>

    <!-- 여기 중요 -->
    <script src="identity.js"></script>

</body>
</html>
